<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🃏 RPS Cheat</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050508;
    --surface: #0d0d14;
    --border: #1e1e2e;
    --green: #00ff88;
    --red: #ff3355;
    --yellow: #ffd700;
    --blue: #4da6ff;
    --dim: #444466;
    --text: #e0e0f0;
    --rock-c: #ff6b6b;
    --paper-c: #4da6ff;
    --scissors-c: #00ff88;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Heebo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
    padding: 0 0 env(safe-area-inset-bottom);
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,136,0.015) 2px, rgba(0,255,136,0.015) 4px);
    pointer-events: none;
    z-index: 100;
  }

  /* ── HEADER ── */
  .header {
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
  }

  .header-icon {
    font-size: 1.6rem;
    filter: drop-shadow(0 0 8px var(--green));
  }

  .header h1 {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 1rem;
    font-weight: 700;
    color: var(--green);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .header .sub {
    font-size: 0.7rem;
    color: var(--dim);
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 1px;
  }

  /* ── SETUP PANEL ── */
  .setup {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .setup-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .setup-label {
    font-size: 0.72rem;
    color: var(--dim);
    font-family: 'IBM Plex Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 1px;
    min-width: 70px;
    flex-shrink: 0;
  }

  .seg-btn-group {
    display: flex;
    gap: 4px;
    flex: 1;
  }

  .seg-btn {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 7px 4px;
    font-family: 'Heebo', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--dim);
    cursor: pointer;
    text-align: center;
    transition: all 0.15s;
  }

  .seg-btn.active {
    background: rgba(0,255,136,0.1);
    border-color: var(--green);
    color: var(--green);
  }

  .input-wrap {
    flex: 1;
    position: relative;
  }

  .name-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'Heebo', sans-serif;
    font-size: 0.9rem;
    transition: border-color 0.2s;
  }

  .name-input:focus { outline: none; border-color: var(--green); }
  .name-input::placeholder { color: var(--dim); }

  .ac-drop {
    position: absolute;
    top: calc(100% + 4px);
    right: 0; left: 0;
    background: #13131f;
    border: 1px solid var(--green);
    border-radius: 8px;
    z-index: 50;
    overflow: hidden;
    max-height: 160px;
    overflow-y: auto;
    display: none;
  }

  .ac-drop.show { display: block; }

  .ac-item {
    padding: 8px 12px;
    font-size: 0.85rem;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--text);
  }

  .ac-item:last-child { border-bottom: none; }
  .ac-item:hover, .ac-item.hl { background: rgba(0,255,136,0.08); color: var(--green); }

  .load-btn {
    background: linear-gradient(135deg, #00cc66, #00ff88);
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 9px 18px;
    font-family: 'Heebo', sans-serif;
    font-weight: 900;
    font-size: 0.85rem;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }

  .load-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(0,255,136,0.3); }
  .load-btn:active { transform: translateY(0); }

  /* ── MAIN CONTENT ── */
  .main {
    flex: 1;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    color: var(--dim);
    padding: 8px 12px;
    background: var(--surface);
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  .status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .status-dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); animation: blink 1.5s infinite; }
  .status-dot.yellow { background: var(--yellow); }
  .status-dot.gray { background: var(--dim); }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── THE RECOMMENDATION ── */
  .rec-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  .rec-header {
    padding: 10px 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 2px;
    border-bottom: 1px solid var(--border);
  }

  .rec-body {
    padding: 20px 16px;
    text-align: center;
  }

  .rec-label {
    font-size: 0.72rem;
    color: var(--dim);
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .rec-choice {
    font-size: 4rem;
    line-height: 1;
    margin-bottom: 8px;
    filter: drop-shadow(0 0 20px currentColor);
    transition: all 0.3s;
  }

  .rec-name {
    font-size: 1.6rem;
    font-weight: 900;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }

  .rec-name.rock { color: var(--rock-c); }
  .rec-name.paper { color: var(--paper-c); }
  .rec-name.scissors { color: var(--scissors-c); }

  .rec-reason {
    font-size: 0.78rem;
    color: var(--dim);
    font-family: 'IBM Plex Mono', monospace;
    line-height: 1.5;
    margin-top: 6px;
  }

  .rec-confidence {
    margin-top: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .conf-label {
    font-size: 0.65rem;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--dim);
    white-space: nowrap;
  }

  .conf-bar {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 6px;
    overflow: hidden;
  }

  .conf-fill {
    height: 100%;
    border-radius: 6px;
    background: linear-gradient(90deg, var(--green), var(--yellow));
    transition: width 0.5s ease;
  }

  .conf-pct {
    font-size: 0.72rem;
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 700;
    color: var(--green);
    min-width: 34px;
    text-align: left;
  }

  /* ── LOCATION HINT (for in-app) ── */
  .location-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
    display: none;
  }

  .location-card.show { display: block; }

  .location-header {
    padding: 10px 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 2px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .location-badge {
    font-size: 0.62rem;
    padding: 2px 8px;
    border-radius: 20px;
    background: rgba(255,215,0,0.1);
    color: var(--yellow);
    border: 1px solid rgba(255,215,0,0.3);
  }

  .location-grid {
    padding: 14px 16px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    direction: ltr;
  }

  .loc-slot {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 6px;
    text-align: center;
    position: relative;
  }

  .loc-slot.highlighted {
    border-color: var(--yellow);
    background: rgba(255,215,0,0.06);
  }

  .loc-slot .pos-label {
    font-size: 0.6rem;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .loc-slot .pos-emoji { font-size: 1.4rem; }

  .loc-slot .pos-name {
    font-size: 0.7rem;
    font-weight: 700;
    margin-top: 3px;
  }

  .loc-slot.highlighted .pos-name { color: var(--yellow); }

  .loc-slot .pos-pct {
    font-size: 0.62rem;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--dim);
    margin-top: 2px;
  }

  .loc-slot.highlighted .pos-pct { color: var(--yellow); }

  /* ── STATS BREAKDOWN ── */
  .stats-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  .stats-header {
    padding: 10px 16px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 2px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
  }

  .stats-count {
    font-size: 0.65rem;
    color: var(--green);
  }

  .stat-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 16px;
    border-bottom: 1px solid var(--border);
  }

  .stat-row:last-child { border-bottom: none; }

  .stat-emoji { font-size: 1.1rem; width: 24px; text-align: center; }
  .stat-label { font-size: 0.8rem; font-weight: 700; width: 72px; flex-shrink: 0; }
  .stat-label.rock { color: var(--rock-c); }
  .stat-label.paper { color: var(--paper-c); }
  .stat-label.scissors { color: var(--scissors-c); }

  .stat-bar-wrap { flex: 1; height: 8px; background: var(--border); border-radius: 8px; overflow: hidden; }
  .stat-bar { height: 100%; border-radius: 8px; transition: width 0.6s ease; }
  .stat-bar.rock { background: var(--rock-c); }
  .stat-bar.paper { background: var(--paper-c); }
  .stat-bar.scissors { background: var(--scissors-c); }

  .stat-pct {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    font-weight: 700;
    width: 36px;
    text-align: left;
    flex-shrink: 0;
  }

  .stat-pct.rock { color: var(--rock-c); }
  .stat-pct.paper { color: var(--paper-c); }
  .stat-pct.scissors { color: var(--scissors-c); }

  /* ── NEXT BUTTON ── */
  .next-btn {
    width: 100%;
    background: rgba(0,255,136,0.08);
    border: 1px solid rgba(0,255,136,0.3);
    border-radius: 12px;
    padding: 16px;
    font-family: 'Heebo', sans-serif;
    font-weight: 900;
    font-size: 1rem;
    color: var(--green);
    cursor: pointer;
    text-align: center;
    transition: all 0.2s;
    letter-spacing: 0.5px;
    display: none;
  }

  .next-btn.show { display: block; }
  .next-btn:hover { background: rgba(0,255,136,0.14); transform: translateY(-1px); }
  .next-btn:active { transform: translateY(0); }

  /* ── EMPTY / LOADING ── */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--dim);
  }

  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.5; }
  .empty-state p { font-size: 0.85rem; line-height: 1.6; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface);
    border: 1px solid var(--green);
    color: var(--green);
    padding: 8px 20px;
    border-radius: 50px;
    font-size: 0.8rem;
    font-family: 'IBM Plex Mono', monospace;
    z-index: 200;
    transition: transform 0.3s;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">🃏</div>
  <div>
    <div class="header h1" style="font-family:'IBM Plex Mono',monospace;font-size:1rem;font-weight:700;color:var(--green);letter-spacing:2px;">RPS CHEAT</div>
    <div class="sub">STATISTICAL ADVISOR v1.0</div>
  </div>
</div>

<!-- Setup -->
<div class="setup">
  <!-- Mode -->
  <div class="setup-row">
    <div class="setup-label">מצב</div>
    <div class="seg-btn-group">
      <button class="seg-btn active" id="mode-app" onclick="setMode('app')">📱 אפליקציה</button>
      <button class="seg-btn" id="mode-physical" onclick="setMode('physical')">🤝 פיזי</button>
    </div>
  </div>

  <!-- Player name -->
  <div class="setup-row">
    <div class="setup-label">יריב</div>
    <div class="input-wrap" id="name-wrap">
      <input type="text" class="name-input" id="player-name" placeholder="שם היריב (אופציונלי)" autocomplete="off" oninput="onNameInput()" onkeydown="onNameKeydown(event)">
      <div class="ac-drop" id="ac-drop"></div>
    </div>
    <button class="load-btn" onclick="loadProfile()">טען ▶</button>
  </div>
</div>

<!-- Main -->
<div class="main">

  <!-- Empty state -->
  <div class="empty-state" id="empty-state">
    <div class="icon">🎯</div>
    <p>בחר יריב ולחץ <strong style="color:var(--green)">טען</strong><br>לקבל המלצה מבוססת נתונים</p>
  </div>

  <!-- Status bar -->
  <div class="status-bar hidden" id="status-bar">
    <div class="status-dot gray" id="status-dot"></div>
    <span id="status-text">טוען...</span>
  </div>

  <!-- Recommendation -->
  <div class="rec-card hidden" id="rec-card">
    <div class="rec-header">המלצה — בחר את זה</div>
    <div class="rec-body">
      <div class="rec-label">אתה צריך לשחק</div>
      <div class="rec-choice" id="rec-emoji">✊</div>
      <div class="rec-name" id="rec-name">אבן</div>
      <div class="rec-reason" id="rec-reason">—</div>
      <div class="rec-confidence">
        <div class="conf-label">ביטחון</div>
        <div class="conf-bar"><div class="conf-fill" id="conf-fill" style="width:0%"></div></div>
        <div class="conf-pct" id="conf-pct">—</div>
      </div>
    </div>
  </div>

  <!-- Location hint (app mode only) -->
  <div class="location-card" id="location-card">
    <div class="location-header">
      <span>מיקום כפתורים</span>
      <span class="location-badge">IN-APP</span>
    </div>
    <div class="location-grid" id="location-grid">
      <!-- filled by JS -->
    </div>
  </div>

  <!-- Stats breakdown -->
  <div class="stats-card hidden" id="stats-card">
    <div class="stats-header">
      <span>התפלגות בחירות</span>
      <span class="stats-count" id="stats-count">0 משחקים</span>
    </div>
    <div class="stat-row">
      <div class="stat-emoji">✊</div>
      <div class="stat-label rock">אבן</div>
      <div class="stat-bar-wrap"><div class="stat-bar rock" id="bar-rock" style="width:0%"></div></div>
      <div class="stat-pct rock" id="pct-rock">0%</div>
    </div>
    <div class="stat-row">
      <div class="stat-emoji">📄</div>
      <div class="stat-label paper">נייר</div>
      <div class="stat-bar-wrap"><div class="stat-bar paper" id="bar-paper" style="width:0%"></div></div>
      <div class="stat-pct paper" id="pct-paper">0%</div>
    </div>
    <div class="stat-row">
      <div class="stat-emoji">✂️</div>
      <div class="stat-label scissors">מספריים</div>
      <div class="stat-bar-wrap"><div class="stat-bar scissors" id="bar-scissors" style="width:0%"></div></div>
      <div class="stat-pct scissors" id="pct-scissors">0%</div>
    </div>
  </div>

  <!-- Next round button -->
  <button class="next-btn" id="next-btn" onclick="nextRound()">סיבוב הבא ↩</button>

</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, get, query, orderByChild, equalTo, update, onValue } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA-IW5ESE-eBuyMBfreGmyPdQV7YmkfmGs",
  authDomain: "rock-paper-scissors-stats.firebaseapp.com",
  databaseURL: "https://rock-paper-scissors-stats-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "rock-paper-scissors-stats",
  storageBucket: "rock-paper-scissors-stats.firebasestorage.app",
  messagingSenderId: "358139389618",
  appId: "1:358139389618:web:c27497f5d7a5b23beb4bab",
  measurementId: "G-PHDLVC4S49"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ── State ──
let currentMode = 'app';
let allPlayers = [];
let currentProfile = null; // { name, games[], stats: {rock,paper,scissors,total} }
let currentRecommendation = null; // { beat, opponentLikelyChoice, confidence, reason }
let acHighlight = -1;

// ── CHOICES ──
const EMOJI = { rock: '✊', paper: '📄', scissors: '✂️' };
const HEB   = { rock: 'אבן', paper: 'נייר', scissors: 'מספריים' };
const BEATS  = { rock: 'paper', paper: 'scissors', scissors: 'rock' };
const BEATEN_BY = { rock: 'scissors', paper: 'rock', scissors: 'paper' };

// ── UTILS ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function hidden(id) { document.getElementById(id).classList.add('hidden'); }
function show(id) { document.getElementById(id).classList.remove('hidden'); }
function el(id) { return document.getElementById(id); }

// ── MODE TOGGLE ──
window.setMode = function(mode) {
  currentMode = mode;
  ['app','physical'].forEach(m => {
    el('mode-' + m).classList.toggle('active', m === mode);
  });
  if (mode === 'app') {
    el('location-card').classList.toggle('show', !!currentRecommendation);
  } else {
    el('location-card').classList.remove('show');
  }
};

// ── LOAD PLAYERS FOR AUTOCOMPLETE ──
onValue(ref(db, 'players'), snap => {
  if (snap.exists()) {
    allPlayers = Object.values(snap.val()).map(p => p.name).filter(Boolean).sort((a,b) => a.localeCompare(b,'he'));
  }
});

// ── AUTOCOMPLETE ──
window.onNameInput = function() {
  const val = el('player-name').value.trim().toLowerCase();
  const drop = el('ac-drop');
  acHighlight = -1;
  if (!val) { drop.classList.remove('show'); return; }
  const matches = allPlayers.filter(p => p.toLowerCase().includes(val)).slice(0, 7);
  if (!matches.length) { drop.classList.remove('show'); return; }
  drop.innerHTML = matches.map((p, i) => {
    const idx = p.toLowerCase().indexOf(val);
    const display = p.slice(0,idx) + '<strong style="color:var(--green)">' + p.slice(idx, idx+val.length) + '</strong>' + p.slice(idx+val.length);
    return `<div class="ac-item" data-name="${p}" data-i="${i}" onmousedown="acPick('${p.replace(/'/g,"\\'")}')">👤 ${display}</div>`;
  }).join('');
  drop.classList.add('show');
};

window.acPick = function(name) {
  el('player-name').value = name;
  el('ac-drop').classList.remove('show');
};

window.onNameKeydown = function(e) {
  const drop = el('ac-drop');
  const items = drop.querySelectorAll('.ac-item');
  if (!drop.classList.contains('show') || !items.length) {
    if (e.key === 'Enter') { e.preventDefault(); loadProfile(); }
    return;
  }
  if (e.key === 'ArrowDown') { e.preventDefault(); acHighlight = Math.min(acHighlight+1, items.length-1); items.forEach((x,i)=>x.classList.toggle('hl',i===acHighlight)); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); acHighlight = Math.max(acHighlight-1,0); items.forEach((x,i)=>x.classList.toggle('hl',i===acHighlight)); }
  else if (e.key === 'Enter') {
    e.preventDefault();
    if (acHighlight >= 0 && items[acHighlight]) { acPick(items[acHighlight].dataset.name); }
    else { loadProfile(); }
  }
  else if (e.key === 'Escape') { drop.classList.remove('show'); }
};

document.addEventListener('click', e => { if (!e.target.closest('#name-wrap')) el('ac-drop').classList.remove('show'); });

// ── LOAD PROFILE ──
window.loadProfile = async function() {
  const name = el('player-name').value.trim();
  el('ac-drop').classList.remove('show');

  hidden('empty-state');
  show('status-bar');
  hidden('rec-card');
  hidden('stats-card');
  el('location-card').classList.remove('show');
  el('next-btn').classList.remove('show');
  el('status-dot').className = 'status-dot yellow';
  el('status-text').textContent = name ? `טוען נתונים של ${name}...` : 'טוען נתוני כלל המשתמשים...';

  try {
    const snap = await get(ref(db, 'games'));
    if (!snap.exists()) {
      setStatus('gray', 'אין נתונים עדיין');
      el('empty-state').style.display = 'block';
      return;
    }

    const allGames = Object.entries(snap.val())
      .map(([id, g]) => ({ id, ...g }))
      .filter(g => !g.cheated); // exclude cheated games

    let relevantGames;
    let sourceLabel;

    if (name) {
      // Games where this person was p1 or p2 (they made a choice)
      // We want to see what THEY chose as a player
      const playerGames = allGames.filter(g =>
        (g.p1 === name || g.p2 === name)
      );

      if (playerGames.length >= 3) {
        // Extract what THIS player chose
        relevantGames = playerGames.map(g => ({
          ...g,
          playerChoice: g.p1 === name ? g.p1Choice : g.p2Choice,
          playerPos: g.p1 === name ? g.p1ChoicePosition : g.p2ChoicePosition
        }));
        sourceLabel = `${name} (${playerGames.length} משחקים)`;
      } else {
        // Not enough data – fall back to global
        relevantGames = allGames.map(g => ({
          ...g,
          playerChoice: g.p1Choice, // use p1 as proxy
          playerPos: g.p1ChoicePosition
        }));
        sourceLabel = `כלל המשתמשים (אין מספיק נתונים על ${name})`;
      }
    } else {
      // No name – global stats
      // Count both p1 and p2 choices
      const doubled = [];
      allGames.forEach(g => {
        if (g.p1Choice) doubled.push({ playerChoice: g.p1Choice, playerPos: g.p1ChoicePosition });
        if (g.p2Choice) doubled.push({ playerChoice: g.p2Choice, playerPos: g.p2ChoicePosition });
      });
      relevantGames = doubled;
      sourceLabel = `כלל המשתמשים (${allGames.length} משחקים)`;
    }

    const stats = computeStats(relevantGames);
    currentProfile = { name, games: relevantGames, stats, sourceLabel };

    renderStats(stats, sourceLabel);
    const rec = computeRecommendation(stats, name);
    currentRecommendation = rec;
    renderRecommendation(rec);
    if (currentMode === 'app') renderLocationHint(stats);

    setStatus('green', `${sourceLabel} · מוכן`);
    show('rec-card');
    show('stats-card');
    el('next-btn').classList.add('show');

    // Watch for cheat detection
    watchForCheat(name, rec);

  } catch(e) {
    setStatus('gray', 'שגיאת חיבור: ' + e.message);
    console.error(e);
  }
};

// ── COMPUTE STATS ──
function computeStats(games) {
  const counts = { rock: 0, paper: 0, scissors: 0 };
  const posCounts = { rock: {}, paper: {}, scissors: {} }; // choice -> position counts

  games.forEach(g => {
    const c = g.playerChoice;
    if (counts[c] !== undefined) {
      counts[c]++;
      const pos = g.playerPos || 'unknown';
      posCounts[c][pos] = (posCounts[c][pos] || 0) + 1;
    }
  });

  const total = counts.rock + counts.paper + counts.scissors;
  const pcts = {};
  ['rock','paper','scissors'].forEach(c => {
    pcts[c] = total > 0 ? Math.round((counts[c] / total) * 100) : 33;
  });

  // Position preference per choice
  const posPrefs = {};
  ['rock','paper','scissors'].forEach(c => {
    const pm = posCounts[c];
    const best = Object.entries(pm).sort((a,b)=>b[1]-a[1])[0];
    posPrefs[c] = best ? best[0] : 'unknown';
  });

  return { counts, pcts, total, posCounts, posPrefs };
}

// ── COMPUTE RECOMMENDATION ──
function computeRecommendation(stats, name) {
  // Find the choice the opponent is most likely to make
  // 75% weight on their own data if enough games, else 25%/75% global vs personal
  const entries = Object.entries(stats.pcts).sort((a,b) => b[1]-a[1]);
  const mostLikely = entries[0][0];
  const confidence = entries[0][1];

  // What beats the most likely choice
  const beat = BEATS[mostLikely];

  const reasonParts = [];
  reasonParts.push(`${name || 'היריב'} בוחר ${HEB[mostLikely]} ${confidence}% מהזמן`);
  reasonParts.push(`→ ${HEB[beat]} מנצח ${HEB[mostLikely]}`);

  return { beat, mostLikely, confidence, reason: reasonParts.join('\n') };
}

// ── RENDER RECOMMENDATION ──
function renderRecommendation(rec) {
  const { beat, confidence, reason } = rec;
  el('rec-emoji').textContent = EMOJI[beat];
  el('rec-name').textContent = HEB[beat];
  el('rec-name').className = 'rec-name ' + beat;
  el('rec-reason').textContent = reason;
  el('conf-fill').style.width = Math.min(confidence, 99) + '%';
  el('conf-pct').textContent = confidence + '%';
}

// ── RENDER STATS ──
function renderStats(stats, sourceLabel) {
  el('stats-count').textContent = `${stats.total} בחירות · ${sourceLabel}`;
  ['rock','paper','scissors'].forEach(c => {
    el('bar-' + c).style.width = stats.pcts[c] + '%';
    el('pct-' + c).textContent = stats.pcts[c] + '%';
  });
}

// ── RENDER LOCATION HINT (in-app mode) ──
function renderLocationHint(stats) {
  // The app shows buttons in shuffled order each round.
  // We show which position each choice tends to appear at historically,
  // and highlight the position of the recommended beat choice.
  const rec = currentRecommendation;
  const posOrder = ['left', 'center', 'right'];
  const posHeb = { left: 'שמאל', center: 'אמצע', right: 'ימין' };

  // For each position, find which choice most often appears there
  // Build position->choice frequency from all games
  const posChoiceCounts = { left: {}, center: {}, right: {} };
  (currentProfile?.games || []).forEach(g => {
    const pos = g.playerPos;
    const choice = g.playerChoice;
    if (posChoiceCounts[pos] && choice) {
      posChoiceCounts[pos][choice] = (posChoiceCounts[pos][choice] || 0) + 1;
    }
  });

  // For each choice, find which position it most prefers
  const choicePrefPos = {};
  ['rock','paper','scissors'].forEach(c => {
    const pm = stats.posCounts[c];
    const total = Object.values(pm).reduce((a,b)=>a+b,0) || 1;
    choicePrefPos[c] = {};
    posOrder.forEach(pos => {
      choicePrefPos[c][pos] = Math.round(((pm[pos]||0)/total)*100);
    });
  });

  // The opponent's most likely choice position
  const likelyChoice = rec.mostLikely;
  const likelyPos = stats.posPrefs[likelyChoice];

  const grid = el('location-grid');
  grid.innerHTML = posOrder.map(pos => {
    // What choice most often appears at this position?
    const best = Object.entries(posChoiceCounts[pos] || {}).sort((a,b)=>b[1]-a[1])[0];
    const bestChoice = best ? best[0] : null;
    const isHighlighted = pos === likelyPos;

    return `
      <div class="loc-slot${isHighlighted ? ' highlighted' : ''}">
        <div class="pos-label">${posHeb[pos]}</div>
        <div class="pos-emoji">${bestChoice ? EMOJI[bestChoice] : '❓'}</div>
        <div class="pos-name">${bestChoice ? HEB[bestChoice] : '?'}</div>
        <div class="pos-pct">${isHighlighted ? '← כאן' : (bestChoice ? choicePrefPos[bestChoice]?.[pos] + '%' : '')}</div>
      </div>`;
  }).join('');

  el('location-card').classList.add('show');
}

// ── NEXT ROUND ──
window.nextRound = function() {
  if (!currentProfile) return;
  renderRecommendation(currentRecommendation);
  showToast('המלצה עדכנית — בהצלחה!');
};

// ── CHEAT DETECTION ──
// If within 30s a game appears with identical p1/p2 and same choices as our recommendation,
// mark it as cheated=true
function watchForCheat(playerName, rec) {
  if (!playerName) return;
  const watchStart = Date.now();
  const WINDOW_MS = 30000;

  const gamesRef = ref(db, 'games');
  const unsub = onValue(gamesRef, async (snap) => {
    if (!snap.exists()) return;
    const now = Date.now();
    if (now - watchStart > WINDOW_MS) { unsub(); return; }

    const games = Object.entries(snap.val());
    for (const [id, g] of games) {
      if (g.cheated) continue;
      if (!g.timestamp || now - g.timestamp > WINDOW_MS) continue;
      // Check if this game involves our player AND matches the recommended beat
      const involvesPlayer = g.p1 === playerName || g.p2 === playerName;
      if (!involvesPlayer) continue;

      const myChoice = g.p1 === playerName ? g.p1Choice : g.p2Choice;
      // Did we play exactly the recommended beat choice?
      if (myChoice === rec.beat) {
        try {
          await update(ref(db, 'games/' + id), { cheated: true });
          console.log('[cheat] marked game', id, 'as cheated');
        } catch(e) { console.warn('[cheat] could not mark', e); }
      }
    }
  });

  // Stop listening after 30s
  setTimeout(() => { try { unsub(); } catch(e){} }, WINDOW_MS + 1000);
}

// ── STATUS ──
function setStatus(color, text) {
  el('status-dot').className = 'status-dot ' + color;
  el('status-text').textContent = text;
}

</script>
